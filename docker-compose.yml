# docker-compose.yml — life-os dev runtime (BE + FE), one command: `docker compose up`
#
# Single-user local app (CLAUDE.md §2 / north-star: simplest thing that fixes the
# real pain). This replaces the manual server-restart-every-session cycle: both
# services run persistently with hot-reload + data persists across restarts.
#
# Start:   docker compose up        (add -d to detach)
# Stop:    docker compose down      (data/ + store/ persist via the mounts below)
# Rebuild: docker compose up --build
#
# Ports: BE host :8686 → container :8686 (NOT :8000 = OutboundOS), FE :3010.
# The browser reaches the API at NEXT_PUBLIC_API_BASE=http://localhost:8686 — the
# HOST-published BE port, NOT the `backend` service name (that only resolves
# container-to-container; NEXT_PUBLIC_* runs in the user's browser on the host).

services:
  backend:
    build: ./backend
    ports:
      - "8686:8686"            # host:container — browser + curl reach life-os here
    volumes:
      # Persist the runtime stores across restarts + keep them editable on host.
      - ./backend/data:/app/data        # md+git store (markdown, git-versioned)
      - ./backend/store:/app/store      # SQLite time-series (price_history/run_log/usage)
      # Hot-reload: mount source so code edits reload without a rebuild.
      - ./backend:/app
      # The user's real project repos sit BESIDE life-os under tinhdev_root. Mount
      # that parent READ-ONLY so the git-reader sees all of them (the reader never
      # writes — :ro enforces the read-only invariant). Without this the container
      # only sees life-os and /projects would show 1 of 6 — Docker must not drop
      # real data. Path is host-specific (1-dev local); override TINHDEV_HOST_DIR.
      - ${TINHDEV_HOST_DIR:-..}:/tinhdev:ro
      # S9 Claude Usage reads ~/.claude/stats-cache.json (real token/usage data).
      # Without this mount the container sees its own empty $HOME → the reader
      # fail-opens to manual mode and the canonical stack shows NO real usage
      # (the 3B-class mount gap: data exists on host, container can't see it).
      # Mount the host's ~/.claude READ-ONLY (reader never writes; single-user).
      # Override CLAUDE_HOST_DIR if your ~/.claude lives elsewhere.
      - ${CLAUDE_HOST_DIR:-${HOME}/.claude}:/claude-home:ro
      # DEV-TRACING-P1 (#63): the dev-activity git-scan reads the user's local repos READ-ONLY
      # to count commits/LOC/active-span per date×repo. The Tinhdev tree is already at /tinhdev:ro
      # (above). The COMPANY repos (PSA, inmobi — the dev tree per the validate script) are
      # SIBLINGS of Tinhdev, OUTSIDE /tinhdev, so mount them separately :ro at /devscan/<name>.
      # Reader never writes (:ro enforced). Override the host paths via PSA_HOST_DIR/INMOBI_HOST_DIR;
      # a missing host dir → the scan honest-skips that root (host-file-source-must-mount).
      - ${PSA_HOST_DIR:-../PSA}:/devscan/PSA:ro
      - ${INMOBI_HOST_DIR:-../inmobi}:/devscan/inmobi:ro
    environment:
      # Point the config's TINHDEV_ROOT at the mounted repos (config.py reads this
      # env directly). Default ../  → /tinhdev so the 6 sibling repos resolve.
      LIFEOS_TINHDEV_ROOT: /tinhdev
      # S9: point the claude-usage reader at the mounted host ~/.claude (above),
      # NOT the container's empty $HOME/.claude. config reads this env.
      LIFEOS_CLAUDE_STATS_PATH: /claude-home/stats-cache.json
      # S9 quota: live 5h/7d rate-limit + reset + context snapshot, tee'd by the
      # host statusline command into ~/.claude/quota-snapshot.json (mounted above).
      LIFEOS_CLAUDE_QUOTA_PATH: /claude-home/quota-snapshot.json
      # S9 tokens: PRIMARY source — live session transcripts (.jsonl) under the
      # mounted host ~/.claude/projects. Real tokens/cost/byProject (stats-cache died).
      LIFEOS_CLAUDE_PROJECTS_DIR: /claude-home/projects
      # CAR-1: the career module seeds the living CV from the user's real source CV,
      # which sits at the tinhdev root (mounted :ro at /tinhdev above). Without this
      # the container's derived path resolves to "/" and the CV falls back to the
      # embedded stub (host-file-source-must-mount lesson).
      LIFEOS_CAREER_CV_SOURCE: /tinhdev/CV_v3_Trustworthy_AI.md
      # DEV-TRACING-P1 (#63): the dev-activity scan roots (colon-separated in-container paths).
      # /tinhdev = the personal repos (already mounted :ro); /devscan/{PSA,inmobi} = the company
      # repos (mounted :ro above). The service finds .git repos under each root. Override
      # DEV_TRACING_ROOTS to change the set. DEV_TRACING_EMAILS = the user's git emails (you vs
      # other identity-map); unset → the scan tags all commits "other" + warns (never silently "you").
      DEV_TRACING_ROOTS: ${DEV_TRACING_ROOTS:-/tinhdev:/devscan/PSA:/devscan/inmobi}
      DEV_TRACING_EMAILS: ${DEV_TRACING_EMAILS:-}
    # Resource caps — safety against host-takedown. The host hit load 188 once
    # (multiple apps + a uvicorn reload-storm). These caps confine any future
    # leak/storm to THIS container (OOM-killed in isolation), never the host.
    # Generous headroom (~10× real 94MiB usage) so normal operation never OOMs.
    # Top-level `mem_limit`/`cpus` (NOT `deploy.resources`, which plain
    # `docker compose up` ignores outside swarm/--compatibility). Verify the cap
    # shows in `docker stats` MEM-LIMIT.
    mem_limit: 1g
    cpus: 2.0
    # (uvicorn --host 0.0.0.0 --port 8686 --reload — from the Dockerfile CMD.)

  frontend:
    build:
      context: ./frontend
      args:
        # Client-side (browser) base URL → MUST be the host-published BE port,
        # NOT http://backend:8686 (service name resolves only inside the network).
        # Tailscale multi-device (PA1): this is the HOST's Tailscale IP so a client
        # browser on another Tailnet device calls the BE on the HOST, not its own
        # localhost. For host-only dev, localhost also works (the IP just routes via
        # Tailscale). Override per-host via API_BASE / NEXT_PUBLIC_API_BASE.
        API_BASE: ${LIFEOS_API_BASE:-http://100.113.13.30:8686}
    ports:
      - "3010:3010"
    environment:
      NEXT_PUBLIC_API_BASE: ${LIFEOS_API_BASE:-http://100.113.13.30:8686}
    volumes:
      - ./frontend:/app
      # Anonymous volumes so the host's (empty/platform-mismatched) dirs don't
      # shadow the container's installed deps / build cache.
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    # Resource caps (see backend above). 2g = ~4× real 533MiB usage — next dev can
    # spike during compile/HMR, so more headroom than backend. cpus capped so a
    # build/watch storm can't starve the host of all cores.
    mem_limit: 2g
    cpus: 2.0
    # (pnpm dev -H 0.0.0.0 -p 3010 — from the Dockerfile CMD.)
