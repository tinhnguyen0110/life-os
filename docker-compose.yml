# docker-compose.yml — life-os dev runtime (BE + FE), one command: `docker compose up`
#
# Single-user local app (CLAUDE.md §2 / north-star: simplest thing that fixes the
# real pain). This replaces the manual server-restart-every-session cycle: both
# services run persistently with hot-reload + data persists across restarts.
#
# Start:   docker compose up        (add -d to detach)
# Stop:    docker compose down      (data/ + store/ persist via the mounts below)
# Rebuild: docker compose up --build
#
# Ports (memory dev-server-ports): BE :8001 (NOT :8000 = OutboundOS), FE :3010.
# The browser reaches the API at NEXT_PUBLIC_API_BASE=http://localhost:8001 — the
# HOST-published BE port, NOT the `backend` service name (that only resolves
# container-to-container; NEXT_PUBLIC_* runs in the user's browser on the host).

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"            # host:container — browser + curl reach life-os here
    volumes:
      # Persist the runtime stores across restarts + keep them editable on host.
      - ./backend/data:/app/data        # md+git store (markdown, git-versioned)
      - ./backend/store:/app/store      # SQLite time-series (price_history/run_log/usage)
      # Hot-reload: mount source so code edits reload without a rebuild.
      - ./backend:/app
      # The user's real project repos sit BESIDE life-os under tinhdev_root. Mount
      # that parent READ-ONLY so the git-reader sees all of them (the reader never
      # writes — :ro enforces the read-only invariant). Without this the container
      # only sees life-os and /projects would show 1 of 6 — Docker must not drop
      # real data. Path is host-specific (1-dev local); override TINHDEV_HOST_DIR.
      - ${TINHDEV_HOST_DIR:-..}:/tinhdev:ro
      # S9 Claude Usage reads ~/.claude/stats-cache.json (real token/usage data).
      # Without this mount the container sees its own empty $HOME → the reader
      # fail-opens to manual mode and the canonical stack shows NO real usage
      # (the 3B-class mount gap: data exists on host, container can't see it).
      # Mount the host's ~/.claude READ-ONLY (reader never writes; single-user).
      # Override CLAUDE_HOST_DIR if your ~/.claude lives elsewhere.
      - ${CLAUDE_HOST_DIR:-${HOME}/.claude}:/claude-home:ro
    environment:
      # Point the config's TINHDEV_ROOT at the mounted repos (config.py reads this
      # env directly). Default ../  → /tinhdev so the 6 sibling repos resolve.
      LIFEOS_TINHDEV_ROOT: /tinhdev
      # S9: point the claude-usage reader at the mounted host ~/.claude (above),
      # NOT the container's empty $HOME/.claude. config reads this env.
      LIFEOS_CLAUDE_STATS_PATH: /claude-home/stats-cache.json
    # (uvicorn --host 0.0.0.0 --port 8001 --reload — from the Dockerfile CMD.)

  frontend:
    build:
      context: ./frontend
      args:
        # Client-side (browser) base URL → MUST be the host-published BE port,
        # NOT http://backend:8001 (service name resolves only inside the network).
        API_BASE: http://localhost:8001
    ports:
      - "3010:3010"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8001
    volumes:
      - ./frontend:/app
      # Anonymous volumes so the host's (empty/platform-mismatched) dirs don't
      # shadow the container's installed deps / build cache.
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    # (pnpm dev -H 0.0.0.0 -p 3010 — from the Dockerfile CMD.)
